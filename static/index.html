<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshino</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon_192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon_512.png">
    <link rel="apple-touch-icon" href="/icons/icon_192.png">
    <meta name="theme-color" content="#2c2c2c">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f1117;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ── Волны ────────────────────────────────────────────────────────── */
        /*
           Каждый SVG имеет viewBox="0 0 2880 300" — ровно 2 периода.
           Реальная ширина SVG = 100vw * 2 (через width/style).
           Анимация: translateX от 0 до -50% = сдвиг на один период.
           При этом точка x=1440 SVG совпадает с x=0, петля бесшовна.
        */
        .wave-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;   /* два периода = 2 × 100vw */
            height: 300px;
            display: block;
        }

        .wave-1 { animation: wscroll 6s   linear infinite;         }
        .wave-2 { animation: wscroll 9s   linear infinite reverse; }
        .wave-3 { animation: wscroll 4s   linear infinite;         }

        @keyframes wscroll {
            from { transform: translateX(0%); }
            to   { transform: translateX(-50%); }
        }

        /* ── Логин-блок ───────────────────────────────────────────────────── */
        .login-box {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(-6vh);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 300px;
        }

        .input-wrap { position: relative; }

        input {
            width: 100%;
            padding: 13px 16px;
            background: #1a1d26;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            font-size: 15px;
            color: #e0e4f0;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input::placeholder { color: #3a3f52; }
        input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74,144,226,0.12);
        }

        /* ── Глазик ───────────────────────────────────────────────────────── */
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: #4a4f65;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            border-radius: 4px;
        }
        .eye-btn:hover { color: #8a90b0; }
        .eye-btn svg { width: 20px; height: 20px; overflow: visible; }
        .eye-pupil {
            transition: opacity 0.15s ease, transform 0.25s ease;
            transform-origin: 50px 50px;
        }
        .eye-slash { opacity: 0; transition: opacity 0.2s ease; }
        .eye-btn.closed .eye-pupil { opacity: 0; transform: scaleY(0); }
        .eye-btn.closed .eye-slash { opacity: 1; }
        input[type="password"], input[type="text"].pwd-visible { padding-right: 44px; }

        /* ── Кнопка ───────────────────────────────────────────────────────── */
        .btn-submit {
            padding: 13px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .btn-submit:hover  { background: #3a7bd5; }
        .btn-submit:active { transform: scale(0.98); }

        #error {
            color: #e05555;
            text-align: center;
            font-size: 13px;
            display: none;
            margin-top: -4px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 28px; margin-bottom: 30px; }
            form { width: 100%; max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="wave-container">

        <!-- Слой 1: тёмно-синий -->
        <svg class="wave wave-1"
             viewBox="0 0 2880 300"
             xmlns="http://www.w3.org/2000/svg"
             preserveAspectRatio="none">
            <path d="
                M0,180
                C240,280 480,80  720,180
                C960,280 1200,80 1440,180
                C1680,280 1920,80 2160,180
                C2400,280 2640,80 2880,180
                L2880,300 L0,300 Z"
                fill="#1a2240"/>
        </svg>

        <!-- Слой 2: тёмная подложка -->
        <svg class="wave wave-2"
             viewBox="0 0 2880 300"
             xmlns="http://www.w3.org/2000/svg"
             preserveAspectRatio="none">
            <path d="
                M0,200
                C240,100 480,290 720,200
                C960,100 1200,290 1440,200
                C1680,100 1920,290 2160,200
                C2400,100 2640,290 2880,200
                L2880,300 L0,300 Z"
                fill="#0d1830" opacity="0.85"/>
        </svg>

        <!-- Слой 3: голубой акцент -->
        <svg class="wave wave-3"
             viewBox="0 0 2880 300"
             xmlns="http://www.w3.org/2000/svg"
             preserveAspectRatio="none">
            <path d="
                M0,230
                C360,140 720,300 1080,230
                C1080,230 1260,160 1440,230
                C1800,140 2160,300 2520,230
                C2520,230 2700,160 2880,230
                L2880,300 L0,300 Z"
                fill="#4a90e2" opacity="0.12"/>
        </svg>

    </div>

    <!-- Форма -->
    <div class="login-box">
        <h1>Oshino</h1>
        <form id="login-form" autocomplete="on">
            <div class="input-wrap">
                <input type="text" name="username" id="username" placeholder="Логин" required autocomplete="username">
            </div>
            <div class="input-wrap">
                <input type="password" name="password" id="pwd-input" placeholder="Пароль" required autocomplete="current-password">
                <button type="button" class="eye-btn closed" id="eye-btn" aria-label="Показать пароль">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="eye-top" d="M10,50 Q50,-10 90,50"
                              stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none"/>
                        <path class="eye-bottom" d="M10,50 Q50,110 90,50"
                              stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none"/>
                        <circle class="eye-pupil" cx="50" cy="50" r="11" fill="currentColor"/>
                        <line class="eye-slash" x1="15" y1="50" x2="85" y2="50"
                              stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <button type="submit" class="btn-submit">Войти</button>
            <div id="error"></div>
        </form>
    </div>

    <script>
        // Глазик
        const eyeBtn   = document.getElementById('eye-btn');
        const pwdInput = document.getElementById('pwd-input');
        const eyeTop   = eyeBtn.querySelector('.eye-top');
        const eyeBot   = eyeBtn.querySelector('.eye-bottom');

        eyeBtn.addEventListener('click', () => {
            const hidden = pwdInput.type === 'password';
            pwdInput.type = hidden ? 'text' : 'password';
            eyeBtn.classList.toggle('closed', !hidden);
            eyeBtn.setAttribute('aria-label', hidden ? 'Скрыть пароль' : 'Показать пароль');
            eyeTop.setAttribute('d', hidden ? 'M10,50 Q50,-10 90,50' : 'M10,50 Q50,40  90,50');
            eyeBot.setAttribute('d', hidden ? 'M10,50 Q50,110 90,50' : 'M10,50 Q50,60  90,50');
        });

        // Форма
        const form     = document.getElementById('login-form');
        const errorDiv = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const login    = document.getElementById('username').value;
            const password = pwdInput.value;
            try {
                const res  = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`
                });
                const data = await res.json();
                if (data.error) {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                } else if (data.success) {
                    if (data.token) localStorage.setItem('oshino_session', data.token);
                    window.location.href = '/main';
                }
            } catch (err) { console.error(err); }
        });
    </script>
</body>
</html>
