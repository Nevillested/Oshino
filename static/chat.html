<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Oshino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        #topbar {
            height: auto;
            background: #2c2c2c;
            color: white;
            display: flex;
            align-items: center;
            padding: 12px 16px;
            z-index: 5;
            flex-shrink: 0;
            gap: 12px;
        }

        #menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #topbar span {
            font-size: 18px;
            font-weight: 600;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #overlay.open {
            display: block;
        }

        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: #2c2c2c;
            color: white;
            z-index: 15;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #sidebar.open {
            transform: translateX(0);
        }

        #close-menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #search-container {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        #search-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
        }

        #search-results {
            background: #1a1a1a;
            border-radius: 6px;
            margin-top: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        #search-results li {
            list-style: none;
            padding: 12px;
            border-bottom: 1px solid #444;
            cursor: pointer;
            font-size: 15px;
        }

        #search-results li:last-child {
            border-bottom: none;
        }

        #search-results li:active {
            background: #333;
        }

        #sidebar h3 {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 16px;
            margin-top: 16px;
            text-transform: uppercase;
        }

        #sidebar h3:first-child {
            margin-top: 0;
        }

        #users {
            list-style: none;
            flex: 1;
        }

        #users li {
            padding: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 6px;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #users li:active {
            background: #444;
        }

        #users li:hover {
            background: #444;
        }

        #users li.active {
            background: #4a90e2;
            font-weight: 600;
        }

        .unread-badge {
            background: #e74c3c;
            color: white;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 700;
            min-width: 22px;
            text-align: center;
            flex-shrink: 0;
        }

        #logout-btn-sidebar {
            margin-top: auto;
            background: #4a90e2;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }

        #logout-btn-sidebar:active {
            background: #357abd;
        }

        #logout-btn-sidebar:hover {
            background: #357abd;
        }

        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
        }

        #offline-notice {
            flex: 1;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #999;
            font-size: 16px;
        }

        #messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #load-more-indicator {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            padding: 6px 0 2px;
            display: none;
        }

        .message {
            padding: 10px 14px;
            border-radius: 10px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .message-wrap {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-wrap.own {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrap.other {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
            padding: 0 4px;
        }

        .message.own {
            background: #4a90e2;
            color: white;
        }

        .message.other {
            background: white;
        }

        #placeholder {
            color: #999;
            text-align: center;
            font-size: 16px;
            padding: 20px;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
            gap: 10px;
            flex-shrink: 0;
            width: 100%;
        }

        #form-area {
            display: flex;
            width: 100%;
            gap: 10px;
        }

        #form-area textarea {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
        }

        #form-area textarea:disabled {
            background: #eee;
            cursor: not-allowed;
        }

        #form-area button {
            padding: 12px 16px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
        }

        #form-area button:active {
            background: #357abd;
        }

        #form-area button:hover {
            background: #357abd;
        }

        #form-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Desktop стили */
        @media (min-width: 768px) {
            #topbar {
                height: auto;
                padding: 12px 16px;
            }

            #topbar span {
                font-size: 18px;
            }

            #sidebar {
                position: fixed;
                width: 300px;
                transform: translateX(-100%);
                height: 100%;
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #overlay.open {
                display: block;
            }

            #chat {
                width: 100%;
            }

            #users li {
                padding: 12px 10px;
                font-size: 15px;
                margin-bottom: 4px;
            }
            
            .message-wrap {
                max-width: 60%;
            }

            .message {
                font-size: 15px;
                padding: 10px 16px;
            }
            
            #form-area textarea {
                font-size: 15px;
                padding: 10px;
            }
            
            #form-area button {
                font-size: 15px;
                padding: 10px 20px;
            }

            #search-input {
                font-size: 15px;
                padding: 10px;
            }

            #logout-btn-sidebar {
                font-size: 15px;
                padding: 12px;
            }
        }

        /* Mobile стили - полная ширина */
        @media (max-width: 767px) {
            #topbar {
                height: 56px;
                padding: 12px 16px;
                gap: 16px;
            }

            #menu-btn {
                font-size: 28px;
                padding: 8px;
            }

            #topbar span {
                font-size: 18px;
                font-weight: 700;
            }

            #sidebar {
                width: 100vw;
                padding: 20px;
            }

            #search-container {
                display: flex;
                gap: 12px;
                align-items: center;
                margin-bottom: 16px;
            }

            #close-menu-btn {
                font-size: 28px;
                padding: 8px;
            }

            #search-input {
                flex: 1;
                font-size: 18px;
                padding: 16px;
            }

            #search-results li {
                font-size: 17px;
                padding: 16px;
            }

            #sidebar h3 {
                font-size: 14px;
                margin-bottom: 18px;
                margin-top: 20px;
            }

            #users li {
                padding: 18px;
                font-size: 20px;
                margin-bottom: 10px;
            }

            #users li.active {
                font-size: 20px;
            }

            #logout-btn-sidebar {
                font-size: 18px;
                padding: 16px;
            }

            .message-wrap {
                max-width: 85%;
            }

            .message {
                font-size: 18px;
                padding: 12px 16px;
            }
            
            #messages {
                padding: 20px;
                gap: 12px;
            }
            
            #form-area textarea {
                font-size: 20px;
                padding: 16px;
            }
            
            #form-area button {
                font-size: 20px;
                padding: 16px 22px;
                min-width: 100px;
            }

            #placeholder {
                font-size: 20px;
                padding: 30px 20px;
            }

            #offline-notice {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="topbar">
        <button id="menu-btn">☰</button>
        <span>Oshino</span>
    </div>

    <div id="overlay"></div>

    <div id="sidebar">
        <div id="search-container">
            <button id="close-menu-btn">☰</button>
            <input type="text" id="search-input" placeholder="Найти пользователя...">
        </div>
        <ul id="search-results"></ul>

        <h3>Диалоги</h3>
        <ul id="users"></ul>

        <button id="logout-btn-sidebar">Выход</button>
    </div>

    <div id="chat">
        <div id="offline-notice">Пользователь не в сети</div>
        <div id="messages">
            <div id="load-more-indicator">загрузка...</div>
        </div>
        <div id="input-area">
            <div id="placeholder">Выберите пользователя для начала диалога</div>
            <div id="form-area" style="display: none;">
                <textarea placeholder="Сообщение..."></textarea>
                <button>Отправить</button>
            </div>
        </div>
    </div>

    <script>
        let currentLogin = null;
        let currentUser = null;
        let onlineUsers = [];
        let unreadCount = {};
        let ws = null;
        let wsReady = false;
        let reconnectTimer = null;
        let reconnecting = false;

        // Состояние пагинации по диалогам: { login: { oldestId, allLoaded } }
        let historyState = {};

        const menuBtn = document.getElementById('menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const usersList = document.getElementById('users');
        const messagesDiv = document.getElementById('messages');
        const inputField = document.querySelector('#form-area textarea');
        const sendBtn = document.querySelector('#form-area button');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const offlineNotice = document.getElementById('offline-notice');
        const placeholder = document.getElementById('placeholder');
        const formArea = document.getElementById('form-area');
        const loadMoreIndicator = document.getElementById('load-more-indicator');

        // ── WebSocket ───────────────────────────────────────────────────────────

        function connectWS() {
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + window.location.host + '/ws');
            wsReady = false;

            ws.onopen = () => {
                console.log('WebSocket подключен');
                wsReady = true;
                reconnecting = false;
                ws.send('getdialogs');
                loadUnreadCounts();
            };

            ws.onmessage = (event) => {
                const message = event.data;

                if (message.startsWith('user:')) {
                    currentLogin = message.substring(5);
                } else if (message.startsWith('dialogs:')) {
                    const dialogs = JSON.parse(message.substring(8));
                    mergeDialogs(dialogs);
                } else if (message.startsWith('online:')) {
                    onlineUsers = JSON.parse(message.substring(7));
                    updateFormState();
                } else if (message.startsWith('msgack:')) {
                    const msg = JSON.parse(message.substring(7));
                    applyMessageAck(msg);
                } else if (message.startsWith('msg:')) {
                    const msg = JSON.parse(message.substring(4));
                    receiveMessage(msg);
                }
            };

            ws.onerror = () => {
                // ничего не делаем — onclose сработает следом
            };

            ws.onclose = () => {
                wsReady = false;
                console.log('WebSocket закрыт, переподключение через 3с...');
                if (!reconnecting) {
                    reconnecting = true;
                    scheduleReconnect();
                }
            };
        }

        function scheduleReconnect() {
            clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(() => {
                // Не переподключаемся если вкладка скрыта — подождём visibilitychange
                if (document.hidden) {
                    reconnecting = true; // флаг, чтобы сразу подключились при возврате
                    return;
                }
                connectWS();
            }, 3000);
        }

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && (reconnecting || !wsReady)) {
                clearTimeout(reconnectTimer);
                connectWS();
            }
        });

        connectWS();

        // ── Sidebar ─────────────────────────────────────────────────────────────

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        });

        closeMenuBtn.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        });

        // ── Поиск ───────────────────────────────────────────────────────────────

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (!query) {
                searchResults.innerHTML = '';
                return;
            }

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const results = await response.json();

                searchResults.innerHTML = '';
                if (results.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = 'не найдено';
                    searchResults.appendChild(li);
                } else {
                    results.forEach(user => {
                        const li = document.createElement('li');
                        li.textContent = user;
                        li.addEventListener('click', () => {
                            addDialog(user);
                            searchInput.value = '';
                            searchResults.innerHTML = '';
                        });
                        searchResults.appendChild(li);
                    });
                }
            } catch (error) {
                console.error('Ошибка поиска:', error);
            }
        });

        // ── Список диалогов ──────────────────────────────────────────────────────

        usersList.addEventListener('click', (e) => {
            const li = e.target.closest('li');
            if (!li) return;
            document.querySelectorAll('#users li').forEach(el => el.classList.remove('active'));
            li.classList.add('active');
            currentUser = li.getAttribute('data-user');
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
            openDialog(currentUser);
        });

        function addDialog(user) {
            if (!historyState[user]) {
                historyState[user] = { oldestId: 0, allLoaded: false, messages: [] };
            }
            renderDialogList();
            // Если ещё не выбран — открываем
            if (!currentUser) {
                currentUser = user;
                document.querySelectorAll('#users li').forEach(el => el.classList.remove('active'));
                const li = usersList.querySelector(`[data-user="${user}"]`);
                if (li) li.classList.add('active');
                openDialog(user);
            }
        }

        function mergeDialogs(users) {
            users.forEach(u => {
                if (!historyState[u]) {
                    historyState[u] = { oldestId: 0, allLoaded: false, messages: [] };
                }
            });
            renderDialogList();
        }

        function renderDialogList() {
            // Сохраняем активный элемент
            usersList.innerHTML = '';
            Object.keys(historyState).forEach(user => {
                const li = document.createElement('li');
                li.setAttribute('data-user', user);
                if (user === currentUser) li.classList.add('active');

                const nameSpan = document.createElement('span');
                nameSpan.textContent = user;
                li.appendChild(nameSpan);

                const count = unreadCount[user] || 0;
                if (count > 0) {
                    const badge = document.createElement('span');
                    badge.className = 'unread-badge';
                    badge.textContent = count;
                    li.appendChild(badge);
                }

                usersList.appendChild(li);
            });
        }

        // ── История сообщений ────────────────────────────────────────────────────

        async function openDialog(user) {
            currentUser = user;
            fetch(`/mark-read?with=${encodeURIComponent(user)}`);
            unreadCount[user] = 0;
            renderDialogList();
            updateFormState();

            const state = historyState[user];

            // Если уже есть сообщения в памяти — показываем сразу, потом дозагружаем
            if (state && state.messages && state.messages.length > 0) {
                renderMessages(state.messages);
            } else {
                messagesDiv.innerHTML = '';
                messagesDiv.appendChild(loadMoreIndicator);
                loadMoreIndicator.style.display = 'none';
                // Первая загрузка
                await loadHistory(user, 0, 20);
            }
        }

        async function loadHistory(user, beforeId, limit) {
            const state = historyState[user];
            if (!state || state.allLoaded) return;
            if (state.loading) return;
            state.loading = true;

            try {
                const url = `/history?with=${encodeURIComponent(user)}&before_id=${beforeId}&limit=${limit}`;
                const resp = await fetch(url);
                if (!resp.ok) { state.loading = false; return; }
                const msgs = await resp.json();

                if (msgs.length < limit) {
                    state.allLoaded = true;
                }

                if (msgs.length > 0) {
                    // Сохраняем самый старый id
                    state.oldestId = msgs[0].id;
                    // Добавляем в начало
                    state.messages = msgs.concat(state.messages);
                }

                if (currentUser === user) {
                    renderMessages(state.messages);
                    if (beforeId === 0) {
                        // Первая загрузка — скролл вниз
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    }
                    // Иначе скролл сохраняется через сохранение высоты
                }
            } catch(e) {
                console.error('Ошибка загрузки истории:', e);
            } finally {
                state.loading = false;
            }
        }

        function formatMessageTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return '';

            const now = new Date();
            const isToday = date.getFullYear() === now.getFullYear()
                && date.getMonth() === now.getMonth()
                && date.getDate() === now.getDate();

            const timePart = date.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            if (isToday) {
                return timePart;
            }

            const datePart = date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            return datePart + ' ' + timePart;
        }

        function renderMessages(msgs) {
            // Сохраняем позицию скролла для подгрузки вверх
            const prevScrollHeight = messagesDiv.scrollHeight;
            const prevScrollTop = messagesDiv.scrollTop;

            messagesDiv.innerHTML = '';
            messagesDiv.appendChild(loadMoreIndicator);

            const state = historyState[currentUser];
            loadMoreIndicator.style.display = (state && !state.allLoaded) ? 'block' : 'none';

            msgs.forEach(msg => {
                const wrap = document.createElement('div');
                wrap.className = 'message-wrap ' + (msg.own ? 'own' : 'other');

                const bubble = document.createElement('div');
                bubble.className = 'message ' + (msg.own ? 'own' : 'other');
                bubble.textContent = msg.text;
                wrap.appendChild(bubble);

                const timeLabel = formatMessageTime(msg.created_at);
                if (timeLabel) {
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'message-time';
                    timeDiv.textContent = timeLabel;
                    wrap.appendChild(timeDiv);
                }

                messagesDiv.appendChild(wrap);
            });

            // Восстанавливаем позицию скролла если подгружали сверху
            if (prevScrollTop === 0 && prevScrollHeight > 0) {
                const newScrollHeight = messagesDiv.scrollHeight;
                messagesDiv.scrollTop = newScrollHeight - prevScrollHeight;
            }
        }

        // Подгрузка при скролле вверх
        messagesDiv.addEventListener('scroll', async () => {
            if (messagesDiv.scrollTop > 40) return;
            if (!currentUser) return;
            const state = historyState[currentUser];
            if (!state || state.allLoaded || state.loading) return;

            const scrollHeightBefore = messagesDiv.scrollHeight;

            await loadHistory(currentUser, state.oldestId, 10);

            // Восстанавливаем позицию
            const scrollHeightAfter = messagesDiv.scrollHeight;
            messagesDiv.scrollTop = scrollHeightAfter - scrollHeightBefore;
        });

        // ── Отправка / получение ─────────────────────────────────────────────────

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function sendMessage() {
            if (!currentUser) return;
            const text = inputField.value.trim();
            if (!text) return;
            if (!wsReady) {
                alert('Нет соединения, попробуйте ещё раз');
                return;
            }

            const msg = { from: currentLogin, to: currentUser, text };
            ws.send('msg:' + JSON.stringify(msg));

            const state = historyState[currentUser];
            if (state) {
                // Временный id (отрицательный) чтобы не путаться с серверными,
                // и временная метка локального времени до получения подтверждения от сервера
                const tmpId = -(Date.now());
                state.messages.push({
                    id: tmpId,
                    from: currentLogin,
                    text,
                    own: true,
                    created_at: new Date().toISOString(),
                    pending: true
                });
            }

            inputField.value = '';
            renderMessages(historyState[currentUser].messages);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Серверное подтверждение отправленного сообщения с реальным created_at из БД
        function applyMessageAck(msg) {
            const state = historyState[msg.to];
            if (!state) return;

            // Находим самое последнее своё непроверенное сообщение с тем же текстом
            for (let i = state.messages.length - 1; i >= 0; i--) {
                const m = state.messages[i];
                if (m.pending && m.own && m.text === msg.text) {
                    m.created_at = msg.created_at;
                    delete m.pending;
                    break;
                }
            }

            if (currentUser === msg.to) {
                renderMessages(state.messages);
            }
        }

        function receiveMessage(msg) {
            if (!historyState[msg.from]) {
                historyState[msg.from] = { oldestId: 0, allLoaded: false, messages: [] };
            }

            const state = historyState[msg.from];
            const tmpId = -(Date.now());
            state.messages.push({
                id: tmpId,
                from: msg.from,
                text: msg.text,
                own: false,
                created_at: msg.created_at
            });

            if (currentUser !== msg.from) {
                unreadCount[msg.from] = (unreadCount[msg.from] || 0) + 1;
            }

            renderDialogList();

            if (currentUser === msg.from) {
                renderMessages(state.messages);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        // ── Состояние формы ──────────────────────────────────────────────────────

        function updateFormState() {
            if (!currentUser) {
                placeholder.style.display = 'block';
                formArea.style.display = 'none';
                offlineNotice.style.display = 'none';
                messagesDiv.style.display = 'flex';
                return;
            }

            const isOnline = onlineUsers.includes(currentUser);

            placeholder.style.display = 'none';
            formArea.style.display = 'flex';
            offlineNotice.style.display = 'none';
            messagesDiv.style.display = 'flex';
        }

        async function loadUnreadCounts() {
            try {
                const resp = await fetch('/unread-counts');
                if (!resp.ok) return;

                unreadCount = await resp.json();
                renderDialogList();
            } catch (e) {
                console.error(e);
            }
        }

        // ── Logout ───────────────────────────────────────────────────────────────

        document.getElementById('logout-btn-sidebar').addEventListener('click', () => {
            window.location.href = '/logout';
        });
    </script>
</body>
</html>
